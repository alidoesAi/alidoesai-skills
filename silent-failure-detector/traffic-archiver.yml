# traffic-archiver — defeats GitHub's 14-day traffic-history wipe (W4 of the measurement-learning plan).
# PLACE THIS AT: .github/workflows/traffic-archiver.yml  in the silent-failure-detector repo, commit + push.
# It appends a clones/views snapshot to .metrics/traffic-history.jsonl every 3 days (well inside the
# 14-day window). Uses the repo's built-in GITHUB_TOKEN (which has traffic-read on its own repo). No secrets.
name: traffic-archiver
on:
  schedule:
    - cron: "0 6 */3 * *"      # every ~3 days at 06:00 UTC
  workflow_dispatch: {}         # also runnable on demand
permissions:
  contents: write
jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch + append traffic snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ts=$(date -u +%FT%TZ)
          clones=$(gh api "repos/$REPO/traffic/clones" 2>/dev/null || echo '{}')
          views=$(gh api  "repos/$REPO/traffic/views"  2>/dev/null || echo '{}')
          mkdir -p .metrics
          printf '{"ts":"%s","clones":%s,"views":%s}\n' "$ts" "$clones" "$views" >> .metrics/traffic-history.jsonl
          git config user.name  "traffic-archiver"
          git config user.email "actions@users.noreply.github.com"
          git add .metrics/traffic-history.jsonl
          git commit -m "metrics: traffic snapshot $ts" || { echo "no change"; exit 0; }
          git push
# Note: the daily clones/views windows overlap between runs — de-dupe by date at analysis time if you want
# exact daily series. The point is presence-over-time of UNIQUE cloners + external issues, not raw totals.
